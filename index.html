<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>
    <link rel="stylesheet" href="style.css">
    <!-- react -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- fine react -->

    <!-- logica -->
    <script type="text/babel">

        const { useState } = React;

        function Modal({
            title,
            content,
            show = false,
            onClose = () => { },
            onConfirm = () => { }

        }) {
            return show && ReactDOM.createPortal(
                <div className="modal-container">
                    <div className="modal">
                        <h2>{title}</h2>
                        {content}
                        <div>
                            <button onClick={onClose}>Annulla</button>
                            <button onClick={onConfirm}>Conferma</button>
                        </div>
                    </div>
                </div>,
                document.body
            )
        }


        const ListaAnimali = () => {

            const animalsChoices = ["Cane", "Gatto", "Pappagallo", "Cavallo", "Panda"];

            const [animal, setAnimal] = useState([])

            const [show, setShow] = useState(false)

            const [animaleAgg, setAnimaleAgg] = useState([''])

            const addAnimal = () => {
                if (!animaleAgg) return;
                setAnimal(curr => [...curr, animaleAgg])
                setAnimaleAgg('')
                setShow(false)
            }

            const aggiungiAnimale = () => {
                //MILESTONE 2
                // const numeroRandom = Math.floor(Math.random() * animalsChoices.length);
                // const animaleRandom = animalsChoices[numeroRandom];
                // setAnimal(curr => [...curr, animaleRandom]);


            }

            return (
                <>
                    <button onClick={() => setShow(true)}> aggiungi un animale</button>
                    <details>
                        <summary>Animali</summary>
                        <ul>
                            {animal.map((a, i) => (
                                <li key={i}>{a}</li>

                            ))}
                        </ul>
                    </details>
                    <Modal
                        show={show}
                        onClose={() => setShow(false)}
                        onConfirm={addAnimal}
                        title='aggiungi animale'
                        content={
                            <input type='text'
                                value={animaleAgg}
                                onChange={e => setAnimaleAgg(e.target.value)}
                            />
                        }
                    />
                </>
            )
        }
    </script>

    <!-- root e render -->
    <script type="text/babel">
        const { createRoot } = ReactDOM;
        const elementoHtml = document.querySelector('.lista-animali');
        const root = createRoot(elementoHtml);
        root.render(<ListaAnimali />)
    </script>
</head>

<body>
    <header>
        <h1>I miei animali Preferiti</h1>
    </header>
    <main>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
        </figure>
        <div class="lista-animali"></div>
    </main>
    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>
</body>

</html>
